# =============================================================================
# ATS – SIA  |  docker-compose.yml
#
# Services
# ────────
#   db    – PostgreSQL 16 with a named volume for persistent data storage.
#   app   – Next.js application container built from the local Dockerfile.
#           Waits for db to pass its healthcheck before starting, then runs
#           `prisma migrate deploy` to apply any pending migrations before
#           launching the Next.js server.
#
# Usage
# ─────
#   # First run (builds the image, starts both services):
#   docker compose up --build
#
#   # Subsequent runs (image already built):
#   docker compose up
#
#   # Run in background:
#   docker compose up -d
#
#   # Tear down (keeps the db volume):
#   docker compose down
#
#   # Tear down and wipe the database volume:
#   docker compose down -v
#
#   # Seed the database (after containers are running):
#   docker compose exec app npm run db:seed
#
# Environment variables
# ─────────────────────
#   Copy .env.example to .env and adjust values as needed.  The compose file
#   reads variables from .env automatically (Docker Compose default behaviour).
#
#   Required overrides in .env:
#     POSTGRES_USER     – PostgreSQL superuser name          (default: ats_user)
#     POSTGRES_PASSWORD – PostgreSQL superuser password      (default: ats_password)
#     POSTGRES_DB       – Database name                      (default: ats_sia_db)
#
#   DATABASE_URL is assembled from the three variables above and injected into
#   the app container so Prisma can connect.  You do not need to set it
#   manually unless you are using an external database.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # db – PostgreSQL 16
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ats_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ats_password}
      POSTGRES_DB: ${POSTGRES_DB:-ats_sia_db}

    # Persistent storage: PostgreSQL data directory is mapped to a named
    # volume so data survives container restarts and re-creation.
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount the init-scripts directory so the database is initialised with
      # the correct extensions on first startup.
      - ./docker/init-db:/docker-entrypoint-initdb.d:ro

    # Expose port 5432 to the host for direct access via psql or a GUI client.
    # Remove or comment out this section in production to limit exposure.
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    # Healthcheck ensures the app container only starts once PostgreSQL is
    # genuinely ready to accept connections (not just the process started).
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-ats_user} -d ${POSTGRES_DB:-ats_sia_db}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  # app – Next.js application
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile

    restart: unless-stopped

    # Wait until PostgreSQL is healthy before starting the application.
    depends_on:
      db:
        condition: service_healthy

    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      HOSTNAME: "0.0.0.0"
      # Assemble DATABASE_URL from the individual Postgres variables so that
      # the app and db service always use the same credentials without
      # requiring the caller to duplicate them.
      DATABASE_URL: "postgresql://${POSTGRES_USER:-ats_user}:${POSTGRES_PASSWORD:-ats_password}@db:5432/${POSTGRES_DB:-ats_sia_db}"

    ports:
      - "${APP_PORT:-3000}:3000"

    # Run migrations then start the server.  Using `sh -c` keeps the
    # entrypoint consistent with the base alpine image used in the Dockerfile.
    command: >
      sh -c "npx prisma migrate deploy && node server.js"

# =============================================================================
# Named volumes
# =============================================================================
volumes:
  # postgres_data persists the PostgreSQL data directory across container
  # lifecycle events (stop, restart, re-creation).  It is only removed when
  # `docker compose down -v` is run explicitly.
  postgres_data:
    driver: local
